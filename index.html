<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trilha Shopee Ads — Apresentações · Efeito Vendas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@200;300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;--sf:#0d0f13;--sf2:#12151a;--ln:#1e222a;
  --tx:#e9e7e4;--mu:#7c828c;--dm:#474c55;
  --or:#ff4d1c;--px:#7B2FFF;--ok:#25c274;--wr:#ffb020;
  --dp:'Bebas Neue',sans-serif;--bd:'Outfit',sans-serif;--mn:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--tx);font-family:var(--bd);font-weight:300;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--or);color:#fff}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}

.app{display:flex;min-height:100vh}
.rail{width:296px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--ln);height:100vh;position:sticky;top:0;overflow-y:auto;overscroll-behavior:contain}
.main{flex:1;min-width:0;padding-bottom:110px}

.brand{padding:26px 22px 20px;border-bottom:1px solid var(--ln);position:sticky;top:0;background:var(--sf);z-index:5}
.brand h1{font-family:var(--dp);font-size:25px;letter-spacing:1.5px;line-height:1}
.brand h1 em{font-style:normal;color:var(--or)}
.brand p{font-family:var(--mn);font-size:9px;letter-spacing:1.6px;color:var(--dm);text-transform:uppercase;margin-top:7px}
.prog{margin-top:14px}
.pbar{height:3px;background:var(--ln);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--or);width:0;transition:width .4s}
.plbl{font-family:var(--mn);font-size:9px;color:var(--mu);margin-top:6px;letter-spacing:.8px}

.nav{padding:6px 0 60px}
.ngrp{border-bottom:1px solid var(--ln)}
.nhd{width:100%;text-align:left;padding:14px 22px;display:flex;align-items:center;gap:11px;transition:background .15s}
.nhd:hover{background:var(--sf2)}
.nhd .num{font-family:var(--mn);font-size:10px;color:var(--or);width:13px;flex-shrink:0}
.nhd .tt{font-family:var(--dp);font-size:16px;letter-spacing:1.1px;flex:1}
.nhd .cnt{font-family:var(--mn);font-size:9px;color:var(--dm)}
.nhd .cv{width:8px;height:8px;border-right:1.5px solid var(--dm);border-bottom:1.5px solid var(--dm);transform:rotate(45deg);transition:.2s;margin-top:-3px}
.ngrp.open .cv{transform:rotate(-135deg);margin-top:2px}
.nlist{display:none;padding-bottom:8px}
.ngrp.open .nlist{display:block}
.nit{width:100%;text-align:left;padding:8px 22px 8px 47px;display:flex;gap:10px;align-items:baseline;font-size:13.5px;color:var(--mu);transition:.15s;position:relative}
.nit:hover,.nit.on{color:var(--tx);background:var(--sf2)}
.nit.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--or)}
.nit .n{font-family:var(--mn);font-size:10px;color:var(--dm);flex-shrink:0;width:17px}
.nit.done .n{color:var(--ok)}
.ntools{padding:16px 22px 8px}
.ntools .lbl{font-family:var(--mn);font-size:9px;letter-spacing:1.6px;color:var(--dm);text-transform:uppercase;margin-bottom:10px}
.ntool{width:100%;text-align:left;padding:9px 0;font-size:13.5px;color:var(--mu);display:flex;align-items:center;gap:10px;transition:.15s}
.ntool:hover,.ntool.on{color:var(--or)}
.ntool svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.6}

.mbar{display:none;position:sticky;top:0;z-index:40;background:rgba(7,8,10,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--ln);padding:12px 16px;align-items:center;gap:12px}
.mbar h1{font-family:var(--dp);font-size:19px;letter-spacing:1.2px;flex:1}
.mbar h1 em{font-style:normal;color:var(--or)}
.bg{width:32px;height:32px;display:flex;flex-direction:column;justify-content:center;gap:4px;flex-shrink:0}
.bg span{height:1.5px;background:var(--tx);width:19px}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:49}
.scrim.on{display:block}

.hero{padding:70px 56px 50px;border-bottom:1px solid var(--ln);position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-160px;top:-170px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(255,77,28,.13),transparent 62%);pointer-events:none}
.eb{font-family:var(--mn);font-size:10px;letter-spacing:2.4px;color:var(--or);text-transform:uppercase;margin-bottom:18px}
.hero h2{font-family:var(--dp);font-size:clamp(40px,6.4vw,76px);line-height:.92;letter-spacing:1px;position:relative}
.hero h2 em{font-style:normal;color:var(--or)}
.hero .tz{max-width:640px;margin-top:26px;font-size:17px;color:var(--mu);line-height:1.65;position:relative}
.hero .tz b{color:var(--tx);font-weight:500}
.stats{display:flex;flex-wrap:wrap;gap:36px;margin-top:40px;position:relative}
.stat .v{font-family:var(--dp);font-size:33px;line-height:1;letter-spacing:.5px}
.stat .l{font-family:var(--mn);font-size:9px;letter-spacing:1.3px;color:var(--dm);text-transform:uppercase;margin-top:7px}

.wrap{padding:44px 56px;max-width:1100px}
.shd{margin-bottom:30px}
.shd .kk{font-family:var(--mn);font-size:10px;letter-spacing:2.2px;color:var(--or);text-transform:uppercase}
.shd h3{font-family:var(--dp);font-size:37px;letter-spacing:1.2px;margin-top:9px;line-height:1}
.shd p{color:var(--mu);margin-top:12px;max-width:680px;font-size:15px}

.mhd{padding:44px 56px 0;max-width:1100px}
.crumb{font-family:var(--mn);font-size:10px;letter-spacing:1.6px;color:var(--dm);text-transform:uppercase;margin-bottom:16px}
.crumb b{color:var(--or);font-weight:400}
.mt{display:flex;gap:20px;align-items:flex-start}
.mt .no{font-family:var(--dp);font-size:58px;line-height:.82;color:var(--or);flex-shrink:0;letter-spacing:1px}
.mt h2{font-family:var(--dp);font-size:clamp(31px,4.3vw,49px);line-height:.96;letter-spacing:.8px}
.mmeta{display:flex;flex-wrap:wrap;gap:9px;margin-top:20px}
.chip{font-family:var(--mn);font-size:9.5px;letter-spacing:1.1px;text-transform:uppercase;padding:6px 11px;border:1px solid var(--ln);border-radius:2px;color:var(--mu)}
.chip.or{border-color:rgba(255,77,28,.4);color:var(--or)}
.chip.px{border-color:rgba(123,47,255,.45);color:#a97bff}
.ideia{margin-top:26px;padding:20px 24px;background:var(--sf);border-left:2px solid var(--or);border-radius:0 3px 3px 0}
.ideia .l{font-family:var(--mn);font-size:9px;letter-spacing:1.8px;color:var(--or);text-transform:uppercase;margin-bottom:9px}
.ideia p{font-size:17.5px;color:var(--tx);font-weight:400;line-height:1.5}

.bar{display:flex;flex-wrap:wrap;gap:10px;margin:28px 56px 0;max-width:1100px;align-items:center}
.btn{font-family:var(--mn);font-size:10px;letter-spacing:1.3px;text-transform:uppercase;padding:11px 17px;border:1px solid var(--ln);border-radius:2px;color:var(--mu);transition:.15s;display:inline-flex;align-items:center;gap:8px}
.btn:hover{border-color:var(--or);color:var(--or)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7}
.btn.pri{background:var(--or);border-color:var(--or);color:#fff}
.btn.pri:hover{background:#e63f10;border-color:#e63f10;color:#fff}
.btn.done{border-color:var(--ok);color:var(--ok)}

.pane{padding:34px 56px;max-width:1100px}
.slg{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:14px}
.sc{background:var(--sf);border:1px solid var(--ln);border-radius:3px;padding:18px;min-height:172px;display:flex;flex-direction:column;transition:.18s;text-align:left;overflow:hidden;position:relative}
.sc:hover{border-color:var(--or);transform:translateY(-2px)}
.sc .n{font-family:var(--mn);font-size:9px;color:var(--or);letter-spacing:1.4px;margin-bottom:11px}
.sc h4{font-family:var(--dp);font-size:20px;letter-spacing:.8px;line-height:1.06;margin-bottom:10px}
.sc .pv{font-size:11.5px;color:var(--mu);line-height:1.5;flex:1;overflow:hidden}
.sc .tp{position:absolute;top:16px;right:16px;font-family:var(--mn);font-size:8px;letter-spacing:1.2px;color:var(--dm);text-transform:uppercase}

.ex{background:var(--sf);border:1px solid var(--ln);border-radius:3px;padding:28px;margin-top:20px}
.ex h4{font-family:var(--dp);font-size:22px;letter-spacing:.8px;margin-bottom:14px}
.ex p{color:#cfcdca;font-size:16px;line-height:1.7}
.note{margin-top:20px;padding:16px 20px;border:1px solid rgba(255,176,32,.28);background:rgba(255,176,32,.05);border-radius:3px}
.note .l{font-family:var(--mn);font-size:9px;letter-spacing:1.6px;color:var(--wr);text-transform:uppercase;margin-bottom:8px}
.note p{font-size:14.5px;color:#c9c7c4;line-height:1.65}

/* ============ DECK ============ */
.dk{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.dk.on{display:flex}
.dk-stage{flex:1;display:flex;flex-direction:column;padding:7vh 7vw 4vh;overflow:hidden;position:relative}
.dk-kick{font-family:var(--mn);font-size:clamp(9px,1.05vw,12px);letter-spacing:2.6px;color:var(--or);text-transform:uppercase;margin-bottom:clamp(16px,3vh,32px)}
.dk-h{font-family:var(--dp);letter-spacing:1px;line-height:.95;margin-bottom:clamp(20px,4vh,46px)}
.dk-body{flex:1;min-height:0;overflow-y:auto;overscroll-behavior:contain}
.rv{opacity:0;transform:translateY(15px);transition:opacity .45s,transform .45s}
.rv.show{opacity:1;transform:none}
.dk-ft{position:relative;z-index:204;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 7vw;border-top:1px solid var(--ln);font-family:var(--mn);font-size:10px;letter-spacing:1.5px;color:var(--dm);text-transform:uppercase}
.dk-ft .mid{flex:1;text-align:center;color:var(--mu)}
.dk-nav{display:flex;gap:8px}
.dk-nav button{width:34px;height:30px;border:1px solid var(--ln);border-radius:2px;display:flex;align-items:center;justify-content:center}
.dk-nav button:hover{border-color:var(--or)}
.dk-nav svg{width:13px;height:13px;stroke:var(--mu);fill:none;stroke-width:1.8}
.dk-nav button:hover svg{stroke:var(--or)}
.dk-pg{position:absolute;left:0;bottom:0;height:2px;background:var(--or);transition:width .3s}
.close{position:fixed;top:14px;right:16px;z-index:210;width:38px;height:38px;border:1px solid var(--ln);border-radius:2px;display:flex;align-items:center;justify-content:center;background:rgba(7,8,10,.85)}
.close svg{width:15px;height:15px;stroke:var(--mu);stroke-width:1.7;fill:none}
.close:hover svg{stroke:var(--or)}

/* slide types */
.s-capa .dk-h{font-size:clamp(46px,8.4vw,124px)}
.s-capa .sub{font-size:clamp(17px,2.3vw,30px);color:var(--mu);font-weight:200;max-width:900px;line-height:1.4}
.dk-h.md{font-size:clamp(34px,6vw,84px)}
.dk-h.sm{font-size:clamp(28px,4.6vw,62px)}
ul.pts{list-style:none;max-width:1180px}
ul.pts li{font-size:clamp(17px,2.35vw,31px);line-height:1.4;color:#dedcd9;margin-bottom:clamp(14px,2.6vh,28px);padding-left:32px;position:relative;font-weight:300}
ul.pts li::before{content:'';position:absolute;left:0;top:.63em;width:17px;height:2px;background:var(--or)}
ul.pts li b{font-weight:600;color:#fff}
ul.pts li i{font-style:normal;color:var(--or);font-weight:500}
.fml{font-family:var(--mn);font-size:clamp(19px,3.5vw,50px);color:#fff;background:var(--sf);border-left:3px solid var(--or);padding:clamp(18px,3.4vh,36px) clamp(20px,3vw,40px);border-radius:0 4px 4px 0;line-height:1.5;letter-spacing:-.5px;overflow-x:auto;white-space:nowrap}
.fml small{display:block;font-size:.44em;color:var(--mu);letter-spacing:0;margin-top:14px;white-space:normal}
.fnote{font-size:clamp(15px,1.9vw,25px);color:var(--mu);margin-top:clamp(18px,3vh,34px);max-width:1000px;line-height:1.5}
.fnote b{color:var(--tx);font-weight:500}
.dtab{width:100%;border-collapse:collapse;font-size:clamp(13px,1.75vw,24px);max-width:1180px}
.dtab th{font-family:var(--mn);font-size:clamp(9px,1.05vw,13px);letter-spacing:1.5px;text-transform:uppercase;color:var(--or);text-align:left;padding:clamp(9px,1.5vh,16px) clamp(9px,1.3vw,20px);border-bottom:1px solid var(--ln);font-weight:400}
.dtab td{padding:clamp(9px,1.5vh,16px) clamp(9px,1.3vw,20px);border-bottom:1px solid var(--ln);color:#cfcdca;font-weight:300}
.dtab tr:last-child td{border-bottom:none}
.dtab td:first-child{color:var(--tx);font-weight:400}
.dtab tr.hl td{color:#fff;background:rgba(255,77,28,.08)}
.dtab tr.hl td:first-child{color:var(--or)}
.big{display:flex;flex-wrap:wrap;gap:clamp(24px,5vw,72px);align-items:flex-start}
.big .bn{font-family:var(--dp);font-size:clamp(76px,15vw,210px);line-height:.82;color:var(--or);letter-spacing:1px}
.big .bt{flex:1;min-width:240px;font-size:clamp(17px,2.3vw,31px);color:#dedcd9;line-height:1.45;font-weight:300;padding-top:clamp(6px,1.6vh,20px)}
.big .bt b{color:#fff;font-weight:600}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,3vw,40px);max-width:1180px}
.cmp .col .ch{font-family:var(--mn);font-size:clamp(9px,1.05vw,13px);letter-spacing:1.8px;text-transform:uppercase;margin-bottom:clamp(12px,2.4vh,24px);padding-bottom:10px;border-bottom:1px solid var(--ln)}
.cmp .col.a .ch{color:var(--dm)}
.cmp .col.b .ch{color:var(--or)}
.cmp .col ul{list-style:none}
.cmp .col li{font-size:clamp(14px,1.85vw,25px);line-height:1.4;margin-bottom:clamp(12px,2.2vh,22px);font-weight:300}
.cmp .col.a li{color:var(--mu)}
.cmp .col.b li{color:#fff}
.qt{font-size:clamp(22px,3.9vw,56px);line-height:1.28;font-weight:200;color:#fff;max-width:1180px;border-left:3px solid var(--or);padding-left:clamp(18px,2.6vw,36px)}
.qt b{font-weight:600;color:var(--or)}
.acao{max-width:1080px}
.acao .ah{font-family:var(--mn);font-size:clamp(9px,1.05vw,13px);letter-spacing:2.2px;color:var(--or);text-transform:uppercase;margin-bottom:clamp(14px,2.6vh,26px)}
.acao ol{list-style:none;counter-reset:a}
.acao li{counter-increment:a;font-size:clamp(16px,2.15vw,29px);line-height:1.42;color:#dedcd9;margin-bottom:clamp(13px,2.4vh,25px);padding-left:clamp(38px,4vw,58px);position:relative;font-weight:300}
.acao li::before{content:counter(a);position:absolute;left:0;top:0;font-family:var(--mn);font-size:.62em;color:var(--or)}

/* ============ FERRAMENTAS ============ */
.calc{background:var(--sf);border:1px solid var(--ln);border-radius:3px;padding:28px;margin-bottom:20px}
.calc h4{font-family:var(--dp);font-size:25px;letter-spacing:.9px;margin-bottom:6px}
.calc .sub{font-size:14px;color:var(--mu);margin-bottom:24px}
.flds{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:15px}
.fld label{display:block;font-family:var(--mn);font-size:9px;letter-spacing:1.3px;color:var(--mu);text-transform:uppercase;margin-bottom:7px}
.fld input,.fld select{width:100%;background:var(--bg);border:1px solid var(--ln);border-radius:2px;padding:11px 13px;color:var(--tx);font-size:15px;outline:none;transition:.15s}
.fld input:focus,.fld select:focus{border-color:var(--or)}
.out{margin-top:24px;padding-top:22px;border-top:1px solid var(--ln);display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:20px}
.out .l{font-family:var(--mn);font-size:9px;letter-spacing:1.3px;color:var(--dm);text-transform:uppercase;margin-bottom:7px}
.out .v{font-family:var(--dp);font-size:30px;letter-spacing:.6px;line-height:1}
.v.g{color:var(--ok)}.v.r{color:var(--or)}.v.y{color:var(--wr)}
.vd{margin-top:20px;padding:14px 18px;border-radius:2px;font-size:14.5px;line-height:1.6;border-left:2px solid var(--or);background:rgba(255,77,28,.06);color:#d8d6d3}
table.t{width:100%;border-collapse:collapse;margin:18px 0;font-size:14.5px}
table.t th{font-family:var(--mn);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--or);text-align:left;padding:11px 14px;border-bottom:1px solid var(--ln);font-weight:400}
table.t td{padding:11px 14px;border-bottom:1px solid var(--ln);color:#cfcdca}
table.t tr:last-child td{border-bottom:none}
table.t td:first-child{color:var(--tx)}
.ck{background:var(--sf);border:1px solid var(--ln);border-radius:3px;padding:26px;margin-bottom:18px}
.ck h4{font-family:var(--dp);font-size:23px;letter-spacing:.9px;margin-bottom:16px}
.cki{display:flex;gap:13px;padding:10px 0;border-bottom:1px solid rgba(30,34,42,.55);align-items:flex-start;text-align:left;width:100%}
.cki:last-child{border-bottom:none}
.ckb{width:16px;height:16px;border:1px solid var(--dm);border-radius:2px;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;transition:.15s}
.cki.on .ckb{background:var(--or);border-color:var(--or)}
.cki.on .ckb::after{content:'';width:9px;height:5px;border-left:1.8px solid #fff;border-bottom:1.8px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.cki span{font-size:15px;color:#cfcdca;line-height:1.55}
.cki.on span{color:var(--dm);text-decoration:line-through}
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(278px,1fr));gap:16px}
.cbox{background:var(--sf);border:1px solid var(--ln);border-radius:3px;padding:22px}
.cbox .l{font-family:var(--mn);font-size:9px;letter-spacing:1.7px;color:var(--or);text-transform:uppercase;margin-bottom:14px}
.cbox .bg2{font-family:var(--dp);font-size:28px;letter-spacing:.7px;line-height:1.1;margin-bottom:10px}
.cbox p{font-size:14px;color:var(--mu);line-height:1.6}
.cbox table.t{margin:0;font-size:13px}
.cbox table.t th,.cbox table.t td{padding:8px 0}
.cbox table.t td:last-child,.cbox table.t th:last-child{text-align:right}
.lei{background:var(--sf);border:1px solid var(--ln);border-left:2px solid var(--px);border-radius:0 3px 3px 0;padding:22px 24px;margin-bottom:14px}
.lei .n{font-family:var(--mn);font-size:9px;letter-spacing:1.7px;color:#a97bff;text-transform:uppercase;margin-bottom:9px}
.lei h4{font-family:var(--dp);font-size:24px;letter-spacing:.8px;margin-bottom:10px}
.lei p{font-size:15px;color:#cfcdca;line-height:1.68}

@media(max-width:1024px){
  .rail{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .25s;width:288px}
  .rail.open{transform:none}
  .mbar{display:flex}
  .hero{padding:44px 20px 36px}
  .wrap,.pane,.mhd,.bar{padding-left:20px;padding-right:20px}
  .bar{margin-left:0;margin-right:0}
  .mt .no{font-size:42px}
  .cmp{grid-template-columns:1fr}
  .dk-stage{padding:6vh 6vw 3vh}
}
@media(max-width:600px){
  .fml{white-space:normal;font-size:clamp(15px,4.6vw,24px)}
}

/* ============ ANOTAÇÃO / OBS ============ */
#ink{position:fixed;inset:0;z-index:203;pointer-events:none;cursor:crosshair}
#ink.live{pointer-events:auto}
.tb{position:fixed;left:50%;transform:translateX(-50%);bottom:70px;z-index:215;display:flex;align-items:center;gap:5px;padding:7px 9px;background:rgba(13,15,19,.93);backdrop-filter:blur(16px);border:1px solid var(--ln);border-radius:5px;transition:opacity .3s,transform .3s;box-shadow:0 8px 32px rgba(0,0,0,.55)}
.tb.hide{opacity:0;transform:translateX(-50%) translateY(18px);pointer-events:none}
.tb button{width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:.13s;border:1px solid transparent}
.tb button svg{width:16px;height:16px;stroke:var(--mu);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.tb button:hover{background:var(--sf2)}
.tb button:hover svg{stroke:var(--tx)}
.tb button.on{background:rgba(255,77,28,.15);border-color:rgba(255,77,28,.45)}
.tb button.on svg{stroke:var(--or)}
.tb .sep{width:1px;height:22px;background:var(--ln);margin:0 3px}
.sw{width:20px;height:20px;border-radius:50%;border:2px solid transparent;transition:.13s;flex-shrink:0}
.sw.on{border-color:#fff;transform:scale(1.14)}
.tb .kb{font-family:var(--mn);font-size:8.5px;letter-spacing:1px;color:var(--dm);padding:0 6px;text-transform:uppercase}
#laser{position:fixed;width:16px;height:16px;border-radius:50%;background:rgba(255,77,28,.95);box-shadow:0 0 14px 5px rgba(255,77,28,.5),0 0 42px 16px rgba(255,77,28,.22);z-index:214;pointer-events:none;display:none;transform:translate(-50%,-50%)}
.dk-ft{transition:opacity .3s}
.dk-ft.dim{opacity:0}
.dk.clean .close{opacity:0}
.dk.clean .close:hover{opacity:1}

/* ============ SLIDES DINÂMICOS ============ */
.mock{background:#101318;border:1px solid #23272f;border-radius:5px;overflow:hidden;max-width:1180px;box-shadow:0 14px 44px rgba(0,0,0,.45)}
.mock-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#161a20;border-bottom:1px solid #23272f}
.mock-bar i{width:9px;height:9px;border-radius:50%;background:#2c313a;display:block}
.mock-bar span{font-family:var(--mn);font-size:clamp(8px,.95vw,11px);letter-spacing:1.3px;color:var(--dm);margin-left:8px;text-transform:uppercase}
.mock table{width:100%;border-collapse:collapse;font-size:clamp(11px,1.45vw,20px)}
.mock th{font-family:var(--mn);font-size:clamp(8px,.92vw,12px);letter-spacing:1.1px;text-transform:uppercase;color:var(--mu);text-align:left;padding:clamp(8px,1.3vh,15px) clamp(8px,1.1vw,17px);border-bottom:1px solid #23272f;font-weight:400;background:#13161b;white-space:nowrap}
.mock td{padding:clamp(8px,1.3vh,15px) clamp(8px,1.1vw,17px);border-bottom:1px solid #1a1e25;color:#c8c6c3;font-weight:300;white-space:nowrap}
.mock tr:last-child td{border-bottom:none}
.mock td:first-child{color:var(--tx);font-weight:400;white-space:normal;min-width:150px}
.mock tr.f td{background:rgba(255,77,28,.09);color:#fff}
.mock tr.f td:first-child{color:var(--or)}
.mock tr.g td{background:rgba(37,194,116,.08)}
.mock-note{font-size:clamp(13px,1.65vw,22px);color:var(--mu);margin-top:clamp(14px,2.4vh,26px);max-width:1080px;line-height:1.5}
.mock-note b{color:var(--or);font-weight:500}

.bars{max-width:1080px}
.bar-r{display:flex;align-items:center;gap:clamp(10px,1.6vw,22px);margin-bottom:clamp(11px,2vh,20px)}
.bar-l{width:clamp(88px,13vw,190px);font-size:clamp(12px,1.5vw,21px);color:#cfcdca;text-align:right;flex-shrink:0;font-weight:300;line-height:1.25}
.bar-t{flex:1;height:clamp(21px,3.4vh,36px);background:#13161b;border-radius:2px;overflow:hidden;position:relative}
.bar-f{height:100%;background:var(--or);width:0;transition:width .75s cubic-bezier(.22,1,.36,1);border-radius:2px}
.bar-r.alt .bar-f{background:var(--px)}
.bar-r.mut .bar-f{background:#2f343d}
.bar-v{width:clamp(62px,8vw,120px);font-family:var(--mn);font-size:clamp(12px,1.55vw,21px);color:#fff;flex-shrink:0}

.passo{max-width:1120px}
.passo .ln{display:flex;align-items:baseline;gap:clamp(12px,1.8vw,26px);padding:clamp(10px,1.8vh,19px) 0;border-bottom:1px solid #1a1e25}
.passo .ln:last-child{border-bottom:none}
.passo .lb{font-size:clamp(13px,1.7vw,24px);color:var(--mu);flex:1;font-weight:300}
.passo .lv{font-family:var(--mn);font-size:clamp(15px,2vw,30px);color:#fff;white-space:nowrap}
.passo .ln.res{border-top:2px solid var(--or);border-bottom:none;margin-top:clamp(8px,1.6vh,16px);padding-top:clamp(14px,2.4vh,24px)}
.passo .ln.res .lb{color:var(--tx);font-weight:500}
.passo .ln.res .lv{color:var(--or);font-size:clamp(22px,3.4vw,52px);font-family:var(--dp);letter-spacing:.8px}
.passo .ln.neg .lv{color:var(--mu)}

.ba{display:grid;grid-template-columns:1fr 1fr;gap:clamp(14px,2.6vw,34px);max-width:1180px}
.ba .cd{background:#101318;border:1px solid #23272f;border-radius:4px;padding:clamp(16px,2.6vh,28px)}
.ba .cd.ok{border-color:rgba(37,194,116,.35)}
.ba .cd .h{font-family:var(--mn);font-size:clamp(8.5px,1vw,12px);letter-spacing:1.8px;text-transform:uppercase;margin-bottom:clamp(12px,2vh,20px);color:var(--dm)}
.ba .cd.ok .h{color:var(--ok)}
.ba .cd .tx{font-size:clamp(14px,1.85vw,26px);line-height:1.4;color:#dedcd9;font-weight:300;margin-bottom:clamp(12px,2vh,20px)}
.ba .cd .tx b{color:var(--or);font-weight:600}
.ba .cd .wy{font-size:clamp(12px,1.45vw,19px);color:var(--mu);line-height:1.5}

.live{max-width:1120px}
.live .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(clamp(110px,15vw,200px),1fr));gap:clamp(10px,1.6vw,20px);margin-bottom:clamp(16px,2.8vh,32px)}
.live .f label{display:block;font-family:var(--mn);font-size:clamp(8px,.95vw,11px);letter-spacing:1.2px;color:var(--mu);text-transform:uppercase;margin-bottom:7px}
.live .f input{width:100%;background:#101318;border:1px solid #23272f;border-radius:3px;padding:clamp(9px,1.5vh,15px) clamp(10px,1.2vw,16px);color:#fff;font-family:var(--mn);font-size:clamp(15px,2vw,28px);outline:none;transition:.15s}
.live .f input:focus{border-color:var(--or)}
.live .res{display:grid;grid-template-columns:repeat(auto-fit,minmax(clamp(120px,16vw,220px),1fr));gap:clamp(14px,2.4vw,32px);padding-top:clamp(16px,2.8vh,30px);border-top:1px solid var(--ln)}
.live .res .l{font-family:var(--mn);font-size:clamp(8px,.95vw,11px);letter-spacing:1.2px;color:var(--dm);text-transform:uppercase;margin-bottom:8px}
.live .res .v{font-family:var(--dp);font-size:clamp(30px,5vw,72px);line-height:.95;letter-spacing:.6px;color:#fff}
.live .res .v.g{color:var(--ok)}.live .res .v.r{color:var(--or)}.live .res .v.y{color:var(--wr)}
.live .vd2{margin-top:clamp(16px,2.8vh,30px);font-size:clamp(13px,1.65vw,22px);color:#cfcdca;line-height:1.5;border-left:2px solid var(--or);padding-left:clamp(14px,1.8vw,24px)}
.live .vd2 b{color:#fff}

.fnl{max-width:1000px;margin:0 auto}
.fnl .st{margin-bottom:clamp(9px,1.6vh,17px);display:flex;align-items:center;gap:clamp(12px,1.8vw,26px)}
.fnl .bx{height:clamp(38px,6.2vh,74px);background:linear-gradient(90deg,var(--or),#ff7a4d);border-radius:3px;display:flex;align-items:center;padding-left:clamp(12px,1.6vw,22px);font-family:var(--dp);font-size:clamp(16px,2.4vw,34px);color:#0b0c0e;letter-spacing:.7px;transition:width .7s cubic-bezier(.22,1,.36,1);overflow:hidden;white-space:nowrap}
.fnl .mt2{font-size:clamp(12px,1.5vw,21px);color:var(--mu);line-height:1.3;flex-shrink:0;width:clamp(90px,14vw,210px)}
.fnl .mt2 b{color:#fff;display:block;font-weight:500}
.fnl .lo{font-family:var(--mn);font-size:clamp(10px,1.2vw,16px);color:var(--or);text-align:right;padding:clamp(3px,.7vh,8px) 0 clamp(3px,.7vh,8px) clamp(100px,15vw,240px)}

@media(max-width:820px){.ba{grid-template-columns:1fr}.tb{bottom:10px;gap:3px;padding:6px}.tb button{width:30px;height:30px}.tb .kb{display:none}}

</style>

 {t:'acao',k:'A mecânica',h:'CINCO PASSOS, A CADA IMPRESSÃO',li:['Você declara <b>intenção</b> — meta de ROAS e orçamento. Não lance','O sistema traduz em valor por conversão: <b>ticket ÷ ROAS alvo</b>','Dois modelos preveem, para aquele comprador específico: probabilidade de clique (pCTR) e de conversão (pCVR)','Converte em lance por impressão: <b>pCTR × pCVR × valor por conversão × 1.000 × fator de controle</b>','Maior lance por impressão vence. Cobrança pela impressão entregue']},
 {t:'fml',k:'O cálculo do passo 4',h:'O LANCE POR IMPRESSÃO',f:'pCTR × pCVR × (ticket ÷ ROAS alvo) × 1.000 × fator',fs:'Recalculado para cada comprador, em cada leilão',note:'Duas pessoas vendo o mesmo produto geram <b>dois lances diferentes</b> — porque pCTR e pCVR são pessoais.'},
 {t:'pts',k:'O fator de controle',h:'O REGULADOR DE RITMO',li:['Ajusta o ritmo de gasto ao longo do dia','Aperta quando o desempenho está pior que a meta','Solta quando está melhor','É por ele que a campanha "acorda" e "dorme" durante o dia']},
 {t:'pts',k:'Calibração',h:'A SAÍDA É UM PREÇO, NÃO UM RANKING',li:['Se fosse ranking, errar a previsão custaria posição','Como é <b>preço</b>, errar a previsão custa <i>dinheiro à plataforma</i>','Por isso o sistema é conservador com produto sem histórico','Ele não sabe prever você ainda — então não arrisca alto']},
 {t:'big',k:'A consequência prática',n:'HISTÓRICO',bt:'não é vaidade. É o que <b>reduz a incerteza da previsão</b> e libera o sistema a apostar mais alto em você. Produto novo não é penalizado — é desconhecido.'},

}

});

    <div class="fld"><label>Gasto atual (R$/mês)</label><input id="c5a" type="number" value="1000" oninput="r5()"></div>

  r1();r2();r3();r4();r5();
}
function o(l,v,c){return `<div class="o"><div class="l">${l}</div><div class="v ${c||''}">${v}</div></div>`}
function r1(){const p=num('c1p'),c=num('c1c'),f=num('c1f'),a=num('c1a')/100;
  const cm=comis(p),ant=p*a,var_=c+cm+f+ant,mc=p-var_,mcp=p?mc/p*100:0,rm=mcp>0?100/mcp:0;
  $('c1o').innerHTML=o('Comissão','R$'+nf(cm))+o('Custos variáveis','R$'+nf(var_))+o('Margem contribuição','R$'+nf(mc),mc>0?'g':'r')+o('Margem %',nf(mcp,1)+'%',mcp>=25?'g':mcp>=15?'y':'r')+o('ROAS de empate',mcp>0?nf(rm,1)+'×':'—','r');
  let t='';
  if(mcp<=0)t='<b>Margem negativa.</b> Este produto perde dinheiro em toda venda, independente do ads. Reformular preço ou custo antes de qualquer campanha.';
  else{const meta=rm*1.5;t=`Com <b>${nf(mcp,1)}% de margem</b>, o ponto de empate é <b>${nf(rm,1)}×</b>. Meta saudável: acima de <b>${nf(meta,1)}×</b>. Todo ROAS abaixo de ${nf(rm,1)}× é prejuízo, por mais bonito que pareça no relatório.`;
   const f2=p<80?79.99:p<100?99.99:p<200?199.99:null;
   if(f2&&p>f2&&p<f2+12)t+=` <b style="color:var(--wr)">Atenção ao degrau:</b> a R$${nf(f2)} a comissão cairia para R$${nf(comis(f2))} — sobraria mais.`;}
  $('c1v').innerHTML=t;
}
function r2(){const t=num('c2t'),c=num('c2c')/100,r=num('c2r')/100,a=num('c2a');
  const lance=a?t*c/a:0,cpm=lance*r*1000,roas=cpm?t*c*r*1000/cpm:0;
  $('c2o').innerHTML=o('Lance por clique','R$'+nf(lance,3),lance>=0.15?'g':'r')+o('CPM previsto','R$'+nf(cpm))+o('ROAS resultante',nf(roas,2)+'×')+o('Veredito',lance>=0.15?'PREMIUM':'RESIDUAL',lance>=0.15?'g':'r');
  $('c2v').innerHTML=lance>=0.15
   ?`Lance de <b>R$${nf(lance,3)}</b> — acima do piso de R$0,15. O produto compete em <b>inventário premium</b>. CPM previsto de R$${nf(cpm)} contra mediana da carteira de R$4,60.`
   :`Lance de <b>R$${nf(lance,3)}</b> — abaixo do piso de R$0,15. O produto opera em <b>inventário residual</b>: o ROAS vai parecer alto porque custou quase nada, mas o volume será minúsculo. Para sair daqui: subir conversão (mais forte), subir ticket ou baixar o ROAS alvo.`;
}
function conf(n){return n<10?0.38:n<30?0.53:n<100?0.71:0.85}
function r3(){const ob=num('c3o'),n=num('c3n'),rf=num('c3r'),C=conf(n),aj=C*ob+(1-C)*rf;
  const cv=x=>x>8?'A':x>=4?'B':x>=2?'C':'Pausar';
  $('c3out').innerHTML=o('Confiabilidade',nf(C,2),n>=30?'g':'r')+o('ROAS observado',nf(ob,1)+'×')+o('ROAS ajustado',nf(aj,1)+'×','y')+o('Curva antes',cv(ob))+o('Curva depois',cv(aj),cv(ob)!==cv(aj)?'r':'g');
  $('c3v').innerHTML=n<30
   ?`Com <b>${n} conversões</b>, apenas <b>${Math.round(C*100)}%</b> do que você vê é sinal — o resto é ruído. A leitura corrigida é <b>${nf(aj,1)}×</b>${cv(ob)!==cv(aj)?`, e isso muda a classificação de <b>${cv(ob)}</b> para <b>${cv(aj)}</b>.`:'.'} Abaixo de 30 conversões a única ação válida é alimentar até gerar volume, ou esperar.`
   :`Com <b>${n} conversões</b> a leitura já é utilizável (confiabilidade ${nf(C,2)}). O ajuste move pouco: ${nf(ob,1)}× para ${nf(aj,1)}×. Pode decidir com esse número.`;
}
function r4(){const p=num('c4p'),q=num('c4q'),d=num('c4d')/100,c=num('c4c');
  const tk=p*q*(1-d),m=p?tk/p:1,va=(m-1)*100,cn=c*Math.pow(m,-0.64),qc=c?(1-cn/c)*100:0,g=(Math.pow(m,0.36)-1)*100,ing=va;
  $('c4o').innerHTML=o('Ticket do kit','R$'+nf(tk))+o('Ganho de ticket','+'+nf(va,1)+'%','g')+o('Nova conversão',nf(cn,2)+'%','r')+o('Ganho ingênuo','+'+nf(ing,1)+'%')+o('Ganho real no lance',(g>=0?'+':'')+nf(g,1)+'%',g>0?'g':'r');
  $('c4v').innerHTML=`Ticket sobe <b>${nf(va,1)}%</b>, mas a Lei 2 derruba a conversão em <b>${nf(qc,1)}%</b>. O ganho real no lance é <b>${nf(g,1)}%</b> — e não os ${nf(ing,1)}% que a conta ingênua promete. ${g>0?'O kit vale a pena, com expectativa calibrada. O ganho de margem por diluir frete e embalagem costuma ser maior que o ganho de lance.':'Nesta configuração o kit <b>não compensa</b> — o desconto está grande demais para o ganho de ticket.'}`;
}
function r5(){const ga=num('c5a'),gm=num('c5g'),gn=num('c5n'),cv=num('c5c');
  const ro=ga?gm/ga:0,mult=ga?gn/ga:0,gmn=gm*Math.pow(mult,1.03),rn=gn?gmn/gn:0,dl=gmn-gm;
  $('c5o').innerHTML=o('ROAS atual',nf(ro,2)+'×')+o('Multiplicador',nf(mult,2)+'×')+o('GMV projetado','R$'+nf(gmn,0))+o('ROAS projetado',nf(rn,2)+'×',rn>=ro*0.95?'g':'y')+o('GMV adicional','R$'+nf(dl,0),'g');
  let t='';
  if(cv<30)t=`<b style="color:var(--or)">Trava de legibilidade.</b> Com apenas ${cv} conversões no mês, este produto está na zona de ruído — você não sabe se o ROAS de ${nf(ro,2)}× é real. Escalar aqui é apostar, não gerenciar. Alimente até 30 conversões antes.`;
  else if(mult<=1)t='Redução de gasto. Lembre da Lei 5: cortar acima de 20% tira 39% do GMV e não melhora o ROAS.';
  else t=`Aplicando a elasticidade <b>1,03</b>, multiplicar o gasto por ${nf(mult,2)}× projeta <b>R$${nf(gmn,0)}</b> de GMV — <b>R$${nf(dl,0)} a mais</b>, com o ROAS praticamente estável. Ritmo recomendado: <b>+20% por semana</b> para não reentrar em aprendizado. Os limites reais são margem, estoque e capacidade operacional — nunca o ROAS.`;
  $('c5v').innerHTML=t;
}

const ink=$('ink'),ctx=ink.getContext('2d');
let mode=null,color='#ff4d1c',drawing=false,strokes={},curS=null,hideT=null;
function key(){return deck?deck.n+'_'+si:'x'}
function fit(){const r=devicePixelRatio||1;ink.width=innerWidth*r;ink.height=innerHeight*r;ctx.setTransform(r,0,0,r,0,0);repaint()}
addEventListener('resize',fit);
function repaint(){ctx.clearRect(0,0,innerWidth,innerHeight);const list=strokes[key()]||[];list.forEach(st=>dstroke(st))}
function dstroke(st){if(st.p.length<2)return;ctx.save();ctx.globalCompositeOperation=st.m==='er'?'destination-out':'source-over';
 ctx.strokeStyle=st.c;ctx.lineWidth=st.w;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=st.m==='mk'?0.32:1;
 ctx.beginPath();ctx.moveTo(st.p[0].x,st.p[0].y);
 for(let i=1;i<st.p.length-1;i++){const a=st.p[i],b=st.p[i+1];ctx.quadraticCurveTo(a.x,a.y,(a.x+b.x)/2,(a.y+b.y)/2)}
 const l=st.p[st.p.length-1];ctx.lineTo(l.x,l.y);ctx.stroke();ctx.restore()}
function tool(m){
 if(m==='lz'){const on=mode==='lz';mode=on?null:'lz';$('laser').style.display=on?'none':'block';ink.classList.remove('live');syncTb();return}
 $('laser').style.display='none';
 mode=(mode===m)?null:m;
 ink.classList.toggle('live',!!mode&&mode!=='lz');
 syncTb();}
function col(c,i){color=c;for(let k=0;k<4;k++)$('sw'+k).classList.toggle('on',k===i);if(!mode||mode==='lz'){tool('pen')}}
function syncTb(){$('tPen').classList.toggle('on',mode==='pen');$('tMk').classList.toggle('on',mode==='mk');$('tEr').classList.toggle('on',mode==='er');$('tLz').classList.toggle('on',mode==='lz')}
function undo(){const l=strokes[key()];if(l&&l.length){l.pop();repaint()}}
function wipe(){strokes[key()]=[];repaint()}
function pos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY}}
function down(e){if(!mode||mode==='lz')return;e.preventDefault();drawing=true;
 const w=mode==='mk'?26:mode==='er'?34:3.4;
 curS={c:color,w:w,m:mode,p:[pos(e)]};(strokes[key()]=strokes[key()]||[]).push(curS)}
function move(e){
 if(mode==='lz'){const q=pos(e);$('laser').style.left=q.x+'px';$('laser').style.top=q.y+'px'}
 if(!drawing||!curS)return;e.preventDefault();curS.p.push(pos(e));repaint()}
function up(){drawing=false;curS=null}
ink.addEventListener('mousedown',down);ink.addEventListener('mousemove',move);
addEventListener('mouseup',up);
ink.addEventListener('touchstart',down,{passive:false});ink.addEventListener('touchmove',move,{passive:false});
addEventListener('touchend',up);
addEventListener('mousemove',e=>{if(mode==='lz'){const q=pos(e);$('laser').style.left=q.x+'px';$('laser').style.top=q.y+'px'}
 if(!deck)return;$('tb').classList.remove('hide');$('dk-ftr')&&0;document.querySelector('.dk-ft').classList.remove('dim');
 clearTimeout(hideT);hideT=setTimeout(()=>{if(!mode){$('tb').classList.add('hide')}document.querySelector('.dk-ft').classList.add('dim')},2600)});

 if(s.t==='fnl'){
  const mx=s.d[0][1];
  return k+`<h2 class="dk-h sm">${s.h}</h2><div class="dk-body"><div class="fnl">

  </div></div>`}
 if(s.t==='live'){
  return k+`<h2 class="dk-h sm">${s.h}</h2><div class="dk-body"><div class="live">
   <div class="row">${s.f.map(x=>`<div class="f"><label>${x[1]}</label><input id="lv_${x[0]}" type="number" step="any" value="${x[2]}" oninput="runLive()"></div>`).join('')}</div>
   <div class="res" id="lvRes"></div><div class="vd2" id="lvVd"></div></div></div>`}
 return null;

   const ant=pr*0.035,mc=pr-cu-cm-fr-ant,m=pr?mc/pr*100:0,emp=m>0?100/m:0;
   return {out:[['Comissão','R$'+nf2(cm)],['Margem','R$'+nf2(mc),mc>0?'g':'r'],['Margem %',nf2(m,1)+'%',m>=25?'g':m>=15?'y':'r'],['ROAS de empate',m>0?nf2(emp,1)+'×':'—','y'],['ROAS atual',nf2(ro,1)+'×',ro>=emp?'g':'r']],
   vd:m<=0?'<b>Margem negativa.</b> Nenhum ROAS salva este produto — o problema é preço ou custo.'
   :ro>=emp?`Empate em <b>${nf2(emp,1)}×</b>, rodando a <b>${nf2(ro,1)}×</b>. Está lucrando. Espaço para escalar até encostar em ${nf2(emp,1)}×.`

'14':[{at:4,s:{t:'live',k:'Simule o kit na tela',h:'QUANTO O KIT REALMENTE ENTREGA',

  calc:g=>{const pu=g('pu'),qt=g('qt'),ds=g('ds')/100,cv=g('cv');
   const tk=pu*qt*(1-ds),m=pu?tk/pu:1,cn=cv*Math.pow(m,-0.64),gl=(Math.pow(m,0.36)-1)*100;
   return {out:[['Ticket do kit','R$'+nf2(tk)],['Ganho de ticket','+'+nf2((m-1)*100,0)+'%','g'],['Nova conversão',nf2(cn,2)+'%','r'],['Ganho real no lance',(gl>=0?'+':'')+nf2(gl,1)+'%',gl>0?'g':'r']],
   vd:`A conta ingênua promete <b>+${nf2((m-1)*100,0)}%</b>. A Lei 2 entrega <b>+${nf2(gl,1)}%</b> no lance. Continua valendo — mas o ganho maior aqui é de <b>margem</b>, por diluir frete e embalagem, não de lance.`}}}}],

   const l=al?tk*cv/al:0,cpm=l*ct*1000;
